name: Agente de Changelog

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  trabalhar:
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Hermes
        run: pip install git+https://github.com/NousResearch/Hermes-Agent.git

      - name: Configurar Git (Obrigatório para o Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Gerar e Enviar Changelog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 1. Gerar o texto limpo e guardar num ficheiro temporário
          echo "Lê o histórico do git e gera um resumo Markdown profissional em português. Não incluas logos." | hermes --yolo chat > novo_changelog.md
          
          # 2. Substituir o antigo pelo novo (limpando o lixo)
          mv novo_changelog.md CHANGELOG.md
          
          # 3. Enviar
          git add CHANGELOG.md
          git commit -m "docs: changelog atualizado pela IA [skip ci]" || echo "Sem mudanças"
          git push origin main