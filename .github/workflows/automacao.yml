name: Agente de Changelog

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  trabalhar:
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Hermes
        run: pip install git+https://github.com/NousResearch/Hermes-Agent.git

      - name: Configurar Git (Obrigatório para o Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Gerar e Enviar Changelog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 1. Enviamos a mensagem para dentro do Hermes usando o pipe '|'
          echo "Lê o histórico do git e gera um resumo em formato Markdown para um ficheiro CHANGELOG.md. Escreve apenas o conteúdo do changelog." | hermes --yolo chat > CHANGELOG.md
          
          # 2. Forçamos o Git a aceitar o ficheiro e enviamos
          git add CHANGELOG.md
          git commit -m "docs: changelog atualizado [skip ci]" || echo "Sem alterações para gravar"
          git push