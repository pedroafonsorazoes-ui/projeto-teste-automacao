name: Agente de Changelog

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  trabalhar:
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Hermes
        run: pip install git+https://github.com/NousResearch/Hermes-Agent.git

      - name: Configurar Git (Obrigatório para o Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Gerar e Enviar Changelog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 1. O Hermes gera o texto e nós guardamos diretamente no ficheiro
          hermes --yolo chat "Gera um resumo dos commits em formato Markdown para um ficheiro CHANGELOG.md. Escreve apenas o conteúdo do changelog." > CHANGELOG.md
          
          # 2. Comandos manuais de Git para garantir que o ficheiro viaja para o GitHub
          git add CHANGELOG.md
          git commit -m "docs: changelog atualizado automaticamente [skip ci]"
          git push