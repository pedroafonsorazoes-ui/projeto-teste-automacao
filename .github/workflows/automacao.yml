name: Agente de Changelog

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  trabalhar:
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Hermes
        run: pip install git+https://github.com/NousResearch/Hermes-Agent.git

      - name: Configurar Git (Obrigatório para o Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Gerar e Enviar Changelog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 1. Pedimos o texto, mas EXIGIMOS que ele coloque o changelog entre tags específicas
          echo "Lê o histórico do git e gera um changelog em Markdown. OBRIGATÓRIO: Coloca todo o texto do changelog exatamente entre a tag <INICIO> e a tag <FIM>. Não escrevas texto fora destas tags." | hermes --yolo chat > saida_bruta.txt
          
          # 2. O Cirurgião: Cortamos TUDO o que está fora das tags (adeus logótipo!) e guardamos no ficheiro final
          sed -n '/<INICIO>/,/<FIM>/p' saida_bruta.txt | grep -v '<INICIO>' | grep -v '<FIM>' > CHANGELOG.md
          
          # 3. Limpamos o lixo, guardamos o ficheiro limpo e enviamos
          rm saida_bruta.txt
          git add CHANGELOG.md
          git commit -m "docs: changelog cirurgicamente extraído [skip ci]" || echo "Sem mudanças"
          git push origin main