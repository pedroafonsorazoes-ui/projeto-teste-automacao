name: Agente de Changelog

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  trabalhar:
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Hermes
        run: pip install git+https://github.com/NousResearch/Hermes-Agent.git

      - name: Configurar Git (Obrigatório para o Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Gerar e Enviar Changelog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 1. Pedimos ao Hermes para escrever o ficheiro diretamente (repara que não há o símbolo ">")
          echo "Lê o histórico do git e utiliza a tua ferramenta de escrita de ficheiros para criar um ficheiro chamado CHANGELOG.md com o resumo profissional em português. Escreve APENAS o texto do changelog no ficheiro, sem logos ou introduções." | hermes --yolo chat
          
          # 2. Verificar se ele criou o ficheiro e enviar
          git add CHANGELOG.md
          git commit -m "docs: changelog limpo via tool nativa [skip ci]" || echo "Sem alterações"
          git push origin main