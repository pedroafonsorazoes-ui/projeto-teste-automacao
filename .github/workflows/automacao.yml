name: Agente de Changelog

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  trabalhar:
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Hermes
        run: pip install git+https://github.com/NousResearch/Hermes-Agent.git

      - name: Configurar Git (Obrigatório para o Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Gerar e Enviar Changelog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Desta vez usamos o Hermes para ESCREVER o ficheiro, sem o ">"
          echo "Lê o histórico do git e utiliza a tua ferramenta de escrita de ficheiros para criar um CHANGELOG.md limpo em português. Não incluas logos ou mensagens de sistema no ficheiro, apenas o conteúdo Markdown." | hermes --yolo chat
          
          git add CHANGELOG.md
          git commit -m "docs: changelog limpo por IA [skip ci]" || echo "Sem mudanças"
          git push