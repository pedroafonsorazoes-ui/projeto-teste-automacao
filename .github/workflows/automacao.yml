name: Agente de Changelog

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  trabalhar:
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Hermes
        run: pip install git+https://github.com/NousResearch/Hermes-Agent.git

      - name: Configurar Git (Obrigatório para o Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Gerar e Enviar Changelog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 1. Pedimos ao Hermes para escrever o ficheiro usando as ferramentas dele
          # Reparaste que tirámos o "> CHANGELOG.md" do fim?
          echo "Lê o histórico do git e escreve (ou atualiza) um ficheiro chamado CHANGELOG.md com o resumo das novidades em português. Usa um formato Markdown limpo e profissional. Não mostres o logo no ficheiro." | hermes --yolo chat
          
          # 2. Enviamos para o GitHub
          git add CHANGELOG.md
          git commit -m "docs: changelog formatado por IA [skip ci]" || echo "Nada para mudar"
          git push